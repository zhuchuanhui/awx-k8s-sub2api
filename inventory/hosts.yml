# inventory/hosts.yml – add low_mem_hosts group
all:
  vars:
    ansible_user: opc
    ansible_become: true
    ansible_host_key_checking: false
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    sub2api_deploy_dir: /home/opc/sub2api-deploy
    sub2api_compose_project_name: sub2api-deploy
    dnf_python_interpreter: /usr/bin/python3
  children:
    awx_controller:
      hosts:
        arm-instance_fw:
          ansible_host: 150.230.63.139
    sub2api_targets:
      hosts:
        amd-instance-internal1:
          ansible_host: 10.0.1.100
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=opc@150.230.63.139"
        amd-instance-internal2:
          ansible_host: 10.0.2.100
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=opc@150.230.63.139"
        arm-instance:
          ansible_host: 140.83.81.132
        amd-instance-1:
          ansible_host: 152.70.84.253
        amd-instance-2:
          ansible_host: 141.147.149.131
    # low‑memory hosts (≈1 GB RAM) – will receive security‑focused tweaks
    low_mem_hosts:
      hosts:
        amd-instance-1:
        amd-instance-2:
        amd-instance-internal1:
        amd-instance-internal2:
        arm-instance:

# individual host groups (kept for backward compatibility)
    awx_controller_host:
      hosts:
        arm-instance_fw:
    amd_instance_internal1:
      hosts:
        amd-instance-internal1:
    amd_instance_internal2:
      hosts:
        amd-instance-internal2:
    arm_instance:
      hosts:
        arm-instance:
    amd_instance_1:
      hosts:
        amd-instance-1:
    amd_instance_2:
      hosts:
        amd-instance-2:
