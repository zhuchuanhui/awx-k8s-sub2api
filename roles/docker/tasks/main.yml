---
- name: Ensure dnf plugin package is present
  ansible.builtin.command: dnf install -y dnf-plugins-core
  changed_when: false

- name: Ensure Docker CE repository is configured
  ansible.builtin.get_url:
    url: "{{ docker_repo_url }}"
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"

- name: Install Docker packages
  ansible.builtin.command: dnf install -y {{ docker_packages | join(' ') }}
  changed_when: false

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add remote user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started
