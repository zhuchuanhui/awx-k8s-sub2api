---
# Build the AWX controller server on Kubernetes.
# This playbook is intended to provision the AWX controller server itself
# using Kubernetes on the AWX controller host.
- name: Build AWX controller server on Kubernetes
  hosts: awx_controller
  gather_facts: true
  become: true

  pre_tasks:
    - name: Validate supported OS family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "RedHat"
        fail_msg: "This playbook currently supports Oracle Linux / RedHat family hosts."

  roles:
    - role: awx_k8s
